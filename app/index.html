<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScanCraft AI</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="style.css">

<link rel="icon" href="icons/icon-192.png">

</head>

<body>

<div id="app-root">

<!-- Top Navigation -->

<header id="top-bar">

<div class="logo">
ScanCraft AI
</div>

<div class="status-indicators">

<div id="ai-status">AI Ready</div>
<div id="network-status">Online</div>

</div>

</header>


<!-- Camera Scan Area -->

<section id="camera-section">

<video id="camera-stream" autoplay playsinline></video>

<canvas id="scan-canvas"></canvas>

<div id="scan-overlay"></div>

<div id="scan-animation">
<div class="scan-line"></div>
</div>

<button id="scan-button">
SCAN
</button>

</section>


<!-- Voice Bubble -->

<div id="voice-bubble">

<div class="voice-wave"></div>
<div class="voice-wave"></div>
<div class="voice-wave"></div>

</div>


<!-- AI Chat Panel -->

<section id="ai-chat-panel">

<div id="chat-header">

AI Object Assistant

</div>

<div id="chat-messages"></div>

<div id="chat-input-area">

<input 
id="chat-input"
type="text"
placeholder="Ask anything about the object..."
>

<button id="send-btn">
Send
</button>

<button id="voice-btn">
🎤
</button>

</div>

</section>


<!-- Object Information Panel -->

<section id="object-panel">

<div id="object-title">
Detected Object
</div>

<div id="object-images"></div>

<div id="object-info"></div>

<div id="object-actions">

<button id="view-3d-btn">
View 3D
</button>

<button id="edit-object-btn">
Edit Object
</button>

<button id="buy-object-btn">
Buy
</button>

</div>

</section>


<!-- 3D Viewer -->

<section id="viewer-section">

<canvas id="viewer-canvas"></canvas>

<div id="viewer-tools">

<button id="paint-tool">
Paint
</button>

<button id="texture-tool">
Texture
</button>

<button id="sketch-tool">
Sketch
</button>

<button id="export-tool">
Export
</button>

</div>

</section>


<!-- Loading Visuals -->

<div id="loading-screen">

<div class="loader"></div>

<div id="loading-text">
Initializing AI Engine...
</div>

</div>


<!-- Notification Toast -->

<div id="toast"></div>


</div>


<!-- Scripts -->

<script type="module" src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("service-worker.js")

})

}

</script>


</body>
</html>
