<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ScanCraft AI 💀</title>

<!-- 🔥 PWA -->
<link rel="manifest" href="./manifest.json" />

<!-- 🎨 Styles -->
<link rel="stylesheet" href="./style.css" />

<!-- 🌌 Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<!-- 🔥 Theme Color -->
<meta name="theme-color" content="#000000" />

</head>

<body>

<!-- ============================= -->
<!-- 🔥 MAIN APP -->
<!-- ============================= -->

<div id="app">

    <!-- 🎥 CAMERA -->
    <video id="camera" autoplay playsinline></video>

    <!-- 🧠 SCAN OVERLAY -->
    <canvas id="overlay"></canvas>

    <!-- ⚡ LOADING -->
    <div id="loading" class="hidden">
        <div class="loader"></div>
        <p>Scanning...</p>
    </div>

    <!-- 🎯 OBJECT PANEL -->
    <div id="object-panel" class="panel hidden">
        <h2 id="object-name">Object</h2>
        <p id="object-info">Details will appear here...</p>
    </div>

    <!-- 🎤 VOICE BUBBLE -->
    <div id="voice-bubble" class="hidden">
        <span>AI Speaking...</span>
    </div>

    <!-- 🔐 LOGIN BUTTON -->
    <button id="login-btn" class="login-btn">Login</button>

    <!-- 🎮 CONTROL BAR -->
    <div id="controls">
        <button id="scan-btn">SCAN</button>
        <button id="stop-btn">STOP</button>
    </div>

</div>

<!-- ============================= -->
<!-- 🔊 AUDIO UNLOCK (Mobile Fix) -->
<!-- ============================= -->

<div id="audio-unlock">
    <button id="start-audio">Tap to Start</button>
</div>

<!-- ============================= -->
<!-- 🚀 MAIN APP SCRIPT -->
<!-- ============================= -->

<script type="module" src="./app.js"></script>

<!-- ============================= -->
<!-- 🔐 LOGIN HANDLER -->
<!-- ============================= -->

<script type="module">
import Auth from "./modules/auth/auth.js"

const btn = document.getElementById("login-btn")

btn.onclick = async ()=>{
    const user = await Auth.login()
    console.log("🔥 Logged in:", user)
}
</script>

<!-- ============================= -->
<!-- 🔧 SERVICE WORKER -->
<!-- ============================= -->

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./service-worker.js")
}
</script>

</body>
</html>
