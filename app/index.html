<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ScanCraft AI</title>

<meta name="theme-color" content="#0f172a">

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="./style.css">

</head>


<body>

<div id="app">

<!-- ================= HEADER ================= -->

<header id="topbar">

<div class="logo">
ScanCraft AI
</div>

<div class="top-actions">

<button id="voiceToggle">🎤</button>

<button id="settingsBtn">⚙</button>

</div>

</header>


<!-- ================= CAMERA SCAN AREA ================= -->

<section id="scan-area">

<div id="camera-container">

<video id="camera" autoplay playsinline></video>

<canvas id="overlay"></canvas>

<div id="scan-overlay">

<div class="scan-grid"></div>

<div id="scan-status">
Scanning environment...
</div>

</div>

</div>

<div id="scan-controls">

<button id="scanBtn" class="primary-btn">

<span>Scan Object</span>

</button>

</div>

</section>


<!-- ================= OBJECT RESULT PANEL ================= -->

<section id="result-panel" class="hidden">

<div id="object-card">

<div class="object-image">

<img id="objectPreview">

</div>

<div class="object-info">

<h2 id="objectName"></h2>

<p id="objectConfidence"></p>

</div>

</div>


<div id="result-tabs">

<button data-tab="ai">AI Explain</button>

<button data-tab="similar">Similar</button>

<button data-tab="history">History</button>

<button data-tab="buy">Buy</button>

<button data-tab="edit">Edit</button>

</div>


<div id="result-content">

<div id="ai-panel" class="result-tab">

<div id="ai-chat"></div>

<div id="ai-input">

<input id="aiQuestion" placeholder="Ask AI about this object">

<button id="askBtn">Ask</button>

</div>

</div>


<div id="similar-panel" class="result-tab hidden">

<div id="similarGallery"></div>

</div>


<div id="history-panel" class="result-tab hidden">

<div id="historyContent"></div>

</div>


<div id="buy-panel" class="result-tab hidden">

<div id="priceList"></div>

</div>


<div id="edit-panel" class="result-tab hidden">

<div id="viewerContainer">

<canvas id="viewerCanvas"></canvas>

</div>

<div id="editor-tools"></div>

</div>

</div>

</section>


<!-- ================= VOICE INTERACTION ================= -->

<div id="voice-ui" class="hidden">

<div id="voice-bubble">

<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

</div>

<div id="voice-status">

Listening...

</div>

</div>


<!-- ================= LOADING SCREEN ================= -->

<div id="loading-screen">

<div class="loader">

<div class="loader-ring"></div>

<p>Initializing AI Engine...</p>

</div>

</div>

</div>


<!-- ================= SERVICE WORKER ================= -->

<script>

if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("./service-worker.js")
}

</script>


<!-- ================= APP BOOT ================= -->

<script type="module" src="./app.js"></script>

</body>

</html>
