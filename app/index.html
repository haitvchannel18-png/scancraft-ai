<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScanCraft AI</title>

<meta name="theme-color" content="#020617">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

</head>

<body>

<div class="app">

<header class="header glass">

<h1 class="logo">ScanCraft AI</h1>

<button class="icon-btn">⚙</button>

</header>

<section class="camera-section">

<div class="camera-box glass">

<video id="camera" autoplay playsinline></video>

<canvas id="overlay"></canvas>

</div>

<div class="scan-area">

<button id="scanBtn" class="scan-btn">

SCAN OBJECT

</button>

</div>

</section>

<section class="feature-grid">

<button id="voiceBtn" class="feature-btn">🎤 Voice AI</button>

<button class="feature-btn">📦 3D Model</button>

<button class="feature-btn">🎨 Paint</button>

<button class="feature-btn">📖 Info</button>

<button class="feature-btn">🖼 Gallery</button>

<button class="feature-btn">📤 Share</button>

</section>

<section class="viewer-section glass">

<h2>3D Viewer</h2>

<div id="modelViewer"></div>

</section>

<section class="info-section glass">

<h2>AI Explanation</h2>

<div id="aiInfo"></div>

</section>

<footer class="footer glass">

<button class="nav-btn">📷</button>

<button class="nav-btn">🧠</button>

<button class="nav-btn">🎮</button>

<button class="nav-btn">⚡</button>

</footer>

</div>

<script src="app.js"></script>

<script>

if ("serviceWorker" in navigator) {

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>

</html>
